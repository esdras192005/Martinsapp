name: Descompactar App

on:
  push:
    paths:
      - '*.zip'

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descompactar e mover arquivos
        run: |
          ZIPFILE=$(ls *.zip | head -n 1)
          unzip -o "$ZIPFILE" -d temp_extract
          rm -f "$ZIPFILE"
          shopt -s dotglob
          FOLDER=$(ls temp_extract)
          mv temp_extract/$FOLDER/* .
          rm -rf temp_extract

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Extrair arquivos do zip"
          git push
